<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katakana Quiz - Sharp Style</title>
    <style>
        :root {
            --bg-body: #212121;
            --bg-card: #333333;
            --text-main: #ffffff;
            --text-dim: #757575;
            --accent-green: #4caf50;
            --accent-red: #f44336;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* Top Header */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5px;
            font-size: 24px;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            background: #2b2b2b;
            padding: 8px 0;
            border-top: 1px solid #3d3d3d;
            border-bottom: 1px solid #3d3d3d;
            color: #76ff03;
            font-size: 18px;
        }

        /* Progress Line */
        .progress-line {
            height: 4px;
            background: #1a1a1a;
            width: 100%;
            position: relative;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: #76ff03;
            transition: width 0.3s;
        }

        /* Flashcard Area */
        .card-area {
            background-color: var(--bg-card);
            height: 280px;
            margin: 20px 0;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .card-icon-top { position: absolute; top: 15px; right: 15px; font-size: 20px; color: var(--text-dim); }
        .card-icon-bottom { position: absolute; bottom: 15px; left: 15px; font-size: 30px; color: var(--text-dim); }

        /* Buttons Area */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-opt {
            background-color: var(--bg-card);
            border: 1px solid #444;
            color: white;
            padding: 18px;
            border-radius: 10px;
            font-size: 22px;
            cursor: pointer;
            text-align: center;
            transition: 0.1s;
        }

        .correct { background-color: var(--accent-green) !important; border-color: var(--accent-green); }
        .wrong { background-color: var(--accent-red) !important; border-color: var(--accent-red); }

        /* Summary Screen */
        #summary {
            display: none;
            background: var(--bg-card);
            padding: 40px 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .result-val { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .btn-restart {
            margin-top: 20px;
            background: #007bff;
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="top-nav">
        <span>← Đoán</span>
        <div style="display: flex; gap: 20px;">
            <span>T</span> <span>⋮</span>
        </div>
    </div>

    <div class="stats-bar">
        <span id="percent-txt" style="color:#4caf50">0%</span>
        <span id="counter-txt">1 / 46</span>
        <span id="score-txt">Đúng: 0</span>
    </div>
    <div class="progress-line"><div id="progress-fill"></div></div>

    <div class="card-area">
        <div class="card-icon-top">✎</div>
        <span id="char-display">...</span>
        <div class="card-icon-bottom">⟳</div>
    </div>

    <div class="options-list" id="options-box">
        </div>
</div>

<div class="container" id="summary">
    <h1 style="color: #76ff03;">HOÀN THÀNH!</h1>
    <div class="result-val">Đúng: <span id="res-correct" style="color:#4caf50">0</span></div>
    <div class="result-val">Sai: <span id="res-wrong" style="color:#f44336">0</span></div>
    <div class="result-val" id="res-acc">Độ chính xác: 0%</div>
    <button class="btn-restart" onclick="restartGame()">LÀM LẠI TỪ ĐẦU</button>
</div>

<script>
    const data = [
        {c: 'ア', r: 'a'}, {c: 'イ', r: 'i'}, {c: 'ウ', r: 'u'}, {c: 'エ', r: 'e'}, {c: 'オ', r: 'o'},
        {c: 'カ', r: 'ka'}, {c: 'キ', r: 'ki'}, {c: 'ク', r: 'ku'}, {c: 'ケ', r: 'ke'}, {c: 'コ', r: 'ko'},
        {c: 'サ', r: 'sa'}, {c: 'シ', r: 'shi'}, {c: 'ス', r: 'su'}, {c: 'セ', r: 'se'}, {c: 'ソ', r: 'so'},
        {c: 'タ', r: 'ta'}, {c: 'チ', r: 'chi'}, {c: 'ツ', r: 'tsu'}, {c: 'テ', r: 'te'}, {c: 'ト', r: 'to'},
        {c: 'ナ', r: 'na'}, {c: 'ニ', r: 'ni'}, {c: 'ヌ', r: 'nu'}, {c: 'ネ', r: 'ne'}, {c: 'ノ', r: 'no'},
        {c: 'ハ', r: 'ha'}, {c: 'ヒ', r: 'hi'}, {c: 'フ', r: 'fu'}, {c: 'ヘ', r: 'he'}, {c: 'ホ', r: 'ho'},
        {c: 'マ', r: 'ma'}, {c: 'ミ', r: 'mi'}, {c: 'ム', r: 'mu'}, {c: 'メ', r: 'me'}, {c: 'モ', r: 'mo'},
        {c: 'ヤ', r: 'ya'}, {c: 'ユ', r: 'yu'}, {c: 'ヨ', r: 'yo'},
        {c: 'ラ', r: 'ra'}, {c: 'リ', r: 'ri'}, {c: 'ル', r: 'ru'}, {c: 'レ', r: 're'}, {c: 'ロ', r: 'ro'},
        {c: 'ワ', r: 'wa'}, {c: 'ヲ', r: 'wo'}, {c: 'ン', r: 'n'}
    ];

    let current = 0;
    let score = 0;
    let wrongs = 0;
    let pool = [];

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function restartGame() {
        current = 0; score = 0; wrongs = 0;
        document.getElementById('summary').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        pool = shuffle([...data]);
        render();
    }

    function render() {
        if (current >= pool.length) {
            showResult();
            return;
        }

        const item = pool[current];
        document.getElementById('char-display').innerText = item.c;
        document.getElementById('counter-txt').innerText = `${current + 1} / ${pool.length}`;
        document.getElementById('score-txt').innerText = `Đúng: ${score}`;
        
        const progress = (current / pool.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
        document.getElementById('percent-txt').innerText = Math.floor(progress) + "%";

        // Create options
        let opts = [item.r];
        while(opts.length < 5) {
            let r = data[Math.floor(Math.random()*data.length)].r;
            if(!opts.includes(r)) opts.push(r);
        }
        opts = shuffle(opts);

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        opts.forEach(o => {
            const btn = document.createElement('div');
            btn.className = 'btn-opt';
            btn.innerText = o;
            btn.onclick = () => check(o, item.r, btn);
            box.appendChild(btn);
        });
    }

    function check(selected, correct, btn) {
        const btns = document.querySelectorAll('.btn-opt');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            wrongs++;
            btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => {
            current++;
            render();
        }, 700);
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('summary').style.display = 'block';
        document.getElementById('res-correct').innerText = score;
        document.getElementById('res-wrong').innerText = wrongs;
        document.getElementById('res-acc').innerText = `Độ chính xác: ${Math.round((score/data.length)*100)}%`;
    }

    restartGame();
</script>

</body>
</html>
